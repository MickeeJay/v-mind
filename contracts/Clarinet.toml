[project]
name = "v-mind"
description = "V-Mind DeFi Strategy Automation Smart Contracts"
authors = []
telemetry = false
cache_dir = "./.cache"
requirements = []
boot_contracts = []

[contracts.error-codes-lib]
path = "contracts/libraries/error-codes-lib.clar"
