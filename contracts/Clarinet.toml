epoch = 2.4

[contracts.strategy-validation-lib]
path = "contracts/libraries/strategy-validation-lib.clar"
clarity_version = 2
epoch = 2.4

[contracts.strategy-trait]
path = "contracts/traits/strategy-trait.clar"
clarity_version = 2
epoch = 2.4

[contracts.vault-token-trait]
path = "contracts/traits/vault-token-trait.clar"
clarity_version = 2
epoch = 2.4

[contracts.protocol-adapter-trait]
path = "contracts/traits/protocol-adapter-trait.clar"
clarity_version = 2
epoch = 2.4

[contracts.v-mind-core]
path = "contracts/v-mind-core.clar"
clarity_version = 2
epoch = 2.4

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
